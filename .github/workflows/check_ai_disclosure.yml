name: Check AI Disclosure

on:
  pull_request_target:
    types: [ opened, edited ]

permissions:
  pull-requests: write
  issues: write

jobs:
  check-ai-disclosure:
    runs-on: ubuntu-latest
    steps:
      - name: Check for AI Disclosure
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! echo "$PR_BODY" | grep -qi "AI Disclosure"; then
            gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body "Your PR description is missing the required AI disclosure. Please review Fastf1's [AI policy](https://docs.fastf1.dev/contributing/ai_policy.html), and then update your PR to include a section titled AI Disclosure (verbatim). PRs without AI disclosures will not be reviewed."
          fi
